<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login | Authentication & RBAC Demo</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="auth-page">

    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-header">

                <h1>Authentication & RBAC Demo</h1>

                <p>

                    Sign in to access protected resources using JWT authentication.

                </p>

            </div>

            <div class="form-group">

                <label>

                    Username

                </label>

                <input
                    id="username"
                    type="text"
                    placeholder="Enter username">

            </div>

            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    id="password"
                    type="password"
                    placeholder="Enter password">

            </div>

            <button
                class="primary-btn full-width"
                onclick="login()">

                Sign In

            </button>

            <div class="auth-footer">

                Don't have an account?

                <a href="signup.html">

                    Create Account

                </a>

            </div>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
